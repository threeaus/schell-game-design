<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Schell Game Design workflow</title>
  <desc id="desc">A five-stage workflow diagram for early game design planning: experience lens, four elements audit, core loop stress test, player motivation map, and honest assessment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf1"/>
      <stop offset="1" stop-color="#f3f7f4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#5b6678"/>
    </marker>
    <style>
      .font { font-family: Inter, Arial, sans-serif; }
      .title { font-size: 36px; font-weight: 800; fill: #1f2937; }
      .subtitle { font-size: 17px; fill: #596579; }
      .card-title { font-size: 21px; font-weight: 800; fill: #253041; }
      .card-subtitle { font-size: 15px; fill: #596579; }
      .body { font-size: 15px; fill: #344054; }
      .caption { font-size: 14px; fill: #6b7280; }
    </style>
  </defs>

  <rect width="1200" height="560" rx="30" fill="url(#bg)"/>
  <rect x="34" y="34" width="1132" height="492" rx="26" fill="#ffffff" opacity="0.76"/>

  <g class="font">
    <text x="70" y="88" class="title">Schell Game Design</text>
    <text x="70" y="122" class="subtitle">Pressure-test the game idea before writing code.</text>
    <text x="70" y="150" class="subtitle">先确认玩家体验，再检查玩法、故事、美学、技术与动机是否互相支持。</text>

    <line x1="255" y1="300" x2="308" y2="300" stroke="#5b6678" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="470" y1="300" x2="523" y2="300" stroke="#5b6678" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="685" y1="300" x2="738" y2="300" stroke="#5b6678" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="900" y1="300" x2="953" y2="300" stroke="#5b6678" stroke-width="3" marker-end="url(#arrow)"/>

    <g filter="url(#shadow)">
      <rect x="70" y="220" width="185" height="170" rx="18" fill="#fff4dd" stroke="#f0c36a"/>
      <circle cx="101" cy="252" r="18" fill="#eab74e"/>
      <text x="101" y="259" text-anchor="middle" font-size="17" font-weight="800" fill="#ffffff">1</text>
      <text x="127" y="252" class="card-title">体验视角</text>
      <text x="127" y="280" class="card-subtitle">Experience lens</text>
      <text x="94" y="326" class="body">玩家应该感到什么？</text>
      <text x="94" y="354" class="caption">tension / discovery</text>
      <text x="94" y="376" class="caption">mastery / surprise</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="285" y="220" width="185" height="170" rx="18" fill="#eaf6f0" stroke="#78b891"/>
      <circle cx="316" cy="252" r="18" fill="#4d9a68"/>
      <text x="316" y="259" text-anchor="middle" font-size="17" font-weight="800" fill="#ffffff">2</text>
      <text x="342" y="252" class="card-title">四要素审计</text>
      <text x="342" y="280" class="card-subtitle">Four elements</text>
      <text x="309" y="326" class="body">机制 / 故事</text>
      <text x="309" y="352" class="body">美学 / 技术</text>
      <text x="309" y="376" class="caption">Do they work together?</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="500" y="220" width="185" height="170" rx="18" fill="#eaf0ff" stroke="#8aa7e6"/>
      <circle cx="531" cy="252" r="18" fill="#5f7fca"/>
      <text x="531" y="259" text-anchor="middle" font-size="17" font-weight="800" fill="#ffffff">3</text>
      <text x="557" y="252" class="card-title">核心回路</text>
      <text x="557" y="280" class="card-subtitle">Core loop test</text>
      <text x="524" y="326" class="body">重复最多的动作</text>
      <text x="524" y="352" class="body">本身好玩吗？</text>
      <text x="524" y="376" class="caption">First 30 seconds matter</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="715" y="220" width="185" height="170" rx="18" fill="#f8edff" stroke="#b79bd7"/>
      <circle cx="746" cy="252" r="18" fill="#8c6bb1"/>
      <text x="746" y="259" text-anchor="middle" font-size="17" font-weight="800" fill="#ffffff">4</text>
      <text x="772" y="252" class="card-title">玩家动机</text>
      <text x="772" y="280" class="card-subtitle">Motivation map</text>
      <text x="739" y="326" class="body">没有奖励时</text>
      <text x="739" y="352" class="body">还想玩吗？</text>
      <text x="739" y="376" class="caption">intrinsic over rewards</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="930" y="220" width="200" height="170" rx="18" fill="#fff2f2" stroke="#dc8a8a"/>
      <circle cx="961" cy="252" r="18" fill="#c65f5f"/>
      <text x="961" y="259" text-anchor="middle" font-size="17" font-weight="800" fill="#ffffff">5</text>
      <text x="987" y="252" class="card-title">诚实评估</text>
      <text x="987" y="280" class="card-subtitle">Honest assessment</text>
      <text x="954" y="326" class="body">保护有效部分</text>
      <text x="954" y="352" class="body">说清风险与缺失</text>
      <text x="954" y="376" class="caption">then choose next 3 steps</text>
    </g>

    <path d="M1030 414 C880 488 330 488 170 414" fill="none" stroke="#5b6678" stroke-width="3" stroke-dasharray="8 9" marker-end="url(#arrow)"/>
    <text x="485" y="480" font-size="17" font-weight="800" fill="#5b6678">test, improve, playtest</text>
    <text x="455" y="508" font-size="15" fill="#6b7280">设计文档不是游戏，试玩才会暴露真相。</text>
  </g>
</svg>
